name: Flutter Auto Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Tarik Kode dari Repository
        uses: actions/checkout@v4

      - name: Setup Java Jdk
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Bersihkan Memori Sisa
        run: flutter clean

      - name: Ambil Dependensi Resmi Proyek
        run: flutter pub get

      - name: Jalankan Perangkat Pembuat Gambar/Splash
        run: |
          flutter pub run flutter_launcher_icons || true
          flutter pub run flutter_native_splash:create || true
     
      #- name: Patch home_widget namespace
       # run: |
          #sed -i '/android {/a \    namespace "es.antonborri.home_widget"' $HOME/.pub-cache/hosted/pub.dev/home_widget-0.3.0/android/build.gradle

      - name: Setup Keystore untuk Release
        run: |
          keytool -genkey -v -keystore android/app/upload-keystore.jks \
    -alias heruwingchun -keyalg RSA -keysize 2048 -validity 10000 \
    -storepass heruhapki -keypass heruhapki \
    -dname "CN=ZonaBeladiri, OU=App, O=Heru, L=Probolinggo, ST=Jatim, C=ID"
          
          cat > android/key.properties <<EOF
          storePassword=heruwingchun 
          keyPassword=heruhapki
          keyAlias=upload
          storeFile=upload-keystore.jks
          EOF

      - name: Compile Menjadi APK Release
        run: flutter build apk --release --split-per-abi

      - name: Upload File APK Hasil Jadi
        uses: actions/upload-artifact@v4
        with:
          name: Zona-Beladiri
          path: build/app/outputs/flutter-apk/*-release.apk