name: athlete_dashboard
description: Premium Athlete Dashboard Application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  shared_preferences: ^2.2.0 
  flutter_native_splash: ^2.4.0
  home_widget: ^0.6.0
  screenshot: ^3.0.0
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1
  rename: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"

flutter_native_splash:
  color: "#0F172A"
  image: "assets/images/splash.png"
  android: true
  ios: false
  android_12:
    image: "assets/images/splash.png"
    color: "#0F172A"